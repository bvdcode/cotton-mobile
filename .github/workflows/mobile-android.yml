name: Mobile Android

env:
  PROJECT_PATH: src/Cotton.Mobile/Cotton.Mobile.csproj
  TEST_PROJECT_PATH: tests/Cotton.Mobile.Tests/Cotton.Mobile.Tests.csproj
  DOTNET_VERSION: 10.0.x
  JAVA_VERSION: "21"
  ANDROID_PLATFORM: "platforms;android-36"
  ANDROID_BUILD_TOOLS: "build-tools;36.0.0"

defaults:
  run:
    shell: bash

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "GitVersion.yml"
      - "src/Cotton.Mobile.Core/**"
      - "src/Cotton.Mobile/**"
      - "tests/**"
      - "scripts/ci/**"
      - "scripts/mobile/**"
      - "store/google-play/**"
      - ".github/workflows/mobile-android.yml"
  pull_request:
    paths:
      - "GitVersion.yml"
      - "src/Cotton.Mobile.Core/**"
      - "src/Cotton.Mobile/**"
      - "tests/**"
      - "scripts/ci/**"
      - "scripts/mobile/**"
      - "store/google-play/**"
      - ".github/workflows/mobile-android.yml"
  workflow_dispatch:
    inputs:
      build_signed_release:
        description: Build signed APK and AAB artifacts.
        required: true
        type: boolean
        default: false
      upload_to_google_play:
        description: Upload signed AAB to Google Play after the release build.
        required: true
        type: boolean
        default: false
      publish_github_release:
        description: Publish the signed APK to the latest GitHub Release.
        required: true
        type: boolean
        default: false
      github_release_tag:
        description: GitHub Release tag used for the stable Android APK download link.
        required: true
        type: string
        default: android-latest
      upload_store_listing:
        description: Upload default store listing text and graphics to Google Play.
        required: true
        type: boolean
        default: false
      confirm_store_listing_review_submission:
        description: Confirm Google Play may automatically send store listing changes for review.
        required: true
        type: boolean
        default: false
      google_play_track:
        description: Google Play release track.
        required: true
        type: string
        default: internal
      google_play_release_status:
        description: Google Play release status.
        required: true
        type: choice
        options:
          - completed
          - draft
        default: completed
      google_play_changes_not_sent_for_review:
        description: Commit the edit without sending changes for review.
        required: true
        type: boolean
        default: false

jobs:
  workflow-dispatch-guards:
    name: Validate Manual Release Inputs
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - name: Validate release input combinations
        run: |
          if [ "${{ inputs.publish_github_release }}" = "true" ] \
            && [ "${{ inputs.build_signed_release }}" != "true" ]; then
            echo "publish_github_release requires build_signed_release=true." >&2
            exit 1
          fi

          if [ "${{ inputs.upload_to_google_play }}" = "true" ] \
            && [ "${{ inputs.build_signed_release }}" != "true" ]; then
            echo "upload_to_google_play requires build_signed_release=true." >&2
            exit 1
          fi

          if [ "${{ inputs.publish_github_release }}" = "true" ] \
            && [ -z "${{ inputs.github_release_tag }}" ]; then
            echo "github_release_tag is required when publish_github_release=true." >&2
            exit 1
          fi

          if [ "${{ inputs.upload_to_google_play }}" = "true" ] \
            && [ -z "${{ inputs.google_play_track }}" ]; then
            echo "google_play_track is required when upload_to_google_play=true." >&2
            exit 1
          fi

  yaml-configs:
    name: Validate YAML Configs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check repository
        uses: actions/checkout@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Validate YAML files
        run: scripts/ci/validate-yaml.rb

  google-play-store-listing-dry-run:
    name: Validate Google Play Store Listing
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Validate default store listing
        run: |
          scripts/mobile/upload-google-play-listing.py \
            --package-name dev.cottoncloud.app \
            --dry-run

  mobile-unit-tests:
    name: Run Mobile Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore test project
        run: dotnet restore "$TEST_PROJECT_PATH"

      - name: Test mobile core
        run: dotnet test "$TEST_PROJECT_PATH" --no-restore --configuration Release --verbosity normal

  android-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs:
      - mobile-unit-tests
    permissions:
      contents: read
    steps:
      - name: Check repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install Android SDK packages
        run: |
          sdkmanager_bin="${ANDROID_HOME:-}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$sdkmanager_bin" ]; then
            sdkmanager_bin="$(command -v sdkmanager)"
          fi
          set +o pipefail
          yes | "$sdkmanager_bin" --licenses >/dev/null
          set -o pipefail
          "$sdkmanager_bin" --install "$ANDROID_PLATFORM" "$ANDROID_BUILD_TOOLS" platform-tools

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore mobile project
        run: dotnet restore "$PROJECT_PATH"

      - name: Build debug APK
        run: |
          dotnet build "$PROJECT_PATH" \
            -f net10.0-android \
            -c Debug \
            --no-restore \
            -p:EmbedAssembliesIntoApk=true

      - name: Upload debug APK
        uses: actions/upload-artifact@v7.0.1
        with:
          name: cotton-mobile-debug-apk
          path: src/Cotton.Mobile/bin/Debug/net10.0-android/**/*Signed.apk
          if-no-files-found: error
          retention-days: 14

  android-signed-release:
    name: Build Signed Release Artifacts
    runs-on: ubuntu-latest
    needs:
      - workflow-dispatch-guards
      - mobile-unit-tests
    if: github.event_name == 'workflow_dispatch' && inputs.build_signed_release
    permissions:
      contents: write
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      GOOGLE_PLAY_PACKAGE_NAME: dev.cottoncloud.app
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Check repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: 6.x

      - name: Determine version
        uses: gittools/actions/gitversion/execute@v4.5.0
        id: gitversion

      - name: Compute Android version code
        run: |
          application_display_version="${{ steps.gitversion.outputs.majorMinorPatch }}"
          if [ -z "$application_display_version" ]; then
            echo "GitVersion MajorMinorPatch output is required." >&2
            exit 1
          fi
          if [[ "$application_display_version" == *-* || "$application_display_version" == *+* ]]; then
            echo "Google Play display version must not include prerelease or metadata labels." >&2
            exit 1
          fi

          android_version_code=$((
            ${{ steps.gitversion.outputs.major }} * 1000000 +
            ${{ steps.gitversion.outputs.minor }} * 10000 +
            ${{ steps.gitversion.outputs.patch }} * 1000 +
            ${{ steps.gitversion.outputs.versionSourceDistance }}
          ))
          if [ "$android_version_code" -le 1 ]; then
            echo "Computed Android versionCode must be greater than the first published versionCode 1." >&2
            exit 1
          fi
          echo "APPLICATION_DISPLAY_VERSION=$application_display_version" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION_CODE=$android_version_code" >> "$GITHUB_ENV"
          echo "GitVersion display version: $application_display_version"
          echo "Android versionCode: $android_version_code"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install Android SDK packages
        run: |
          sdkmanager_bin="${ANDROID_HOME:-}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$sdkmanager_bin" ]; then
            sdkmanager_bin="$(command -v sdkmanager)"
          fi
          set +o pipefail
          yes | "$sdkmanager_bin" --licenses >/dev/null
          set -o pipefail
          "$sdkmanager_bin" --install "$ANDROID_PLATFORM" "$ANDROID_BUILD_TOOLS" platform-tools

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Validate signing secrets
        run: |
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is required." >&2
            exit 1
          fi
          if [ -z "${ANDROID_KEYSTORE_ALIAS:-}" ]; then
            echo "ANDROID_KEYSTORE_ALIAS secret is required." >&2
            exit 1
          fi
          if [ -z "${ANDROID_KEYSTORE_PASSWORD:-}" ]; then
            echo "ANDROID_KEYSTORE_PASSWORD secret is required." >&2
            exit 1
          fi
          if [ -z "${ANDROID_KEY_PASSWORD:-}" ]; then
            echo "ANDROID_KEY_PASSWORD is empty; using ANDROID_KEYSTORE_PASSWORD for the key password."
            echo "ANDROID_KEY_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          fi

      - name: Restore mobile project
        run: dotnet restore "$PROJECT_PATH"

      - name: Decode upload keystore
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/cotton-upload.keystore"
          chmod 600 "$RUNNER_TEMP/cotton-upload.keystore"

      - name: Publish signed APK and AAB
        run: |
          dotnet publish "$PROJECT_PATH" \
            -f net10.0-android \
            -c Release \
            --no-restore \
            -p:AndroidPackageFormats=apk%3Baab \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore="$RUNNER_TEMP/cotton-upload.keystore" \
            -p:AndroidSigningKeyAlias="$ANDROID_KEYSTORE_ALIAS" \
            -p:AndroidSigningKeyPass="env:ANDROID_KEY_PASSWORD" \
            -p:AndroidSigningStorePass="env:ANDROID_KEYSTORE_PASSWORD" \
            -p:ApplicationDisplayVersion="$APPLICATION_DISPLAY_VERSION" \
            -p:ApplicationVersion="$ANDROID_VERSION_CODE"

      - name: Upload signed Android artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: cotton-mobile-signed-android
          path: |
            src/Cotton.Mobile/bin/Release/net10.0-android/**/*.apk
            src/Cotton.Mobile/bin/Release/net10.0-android/**/*.aab
          if-no-files-found: error
          retention-days: 30

      - name: Prepare GitHub Release assets
        if: inputs.publish_github_release
        run: |
          release_dir="$RUNNER_TEMP/cotton-mobile-github-release"
          mkdir -p "$release_dir"

          apk_path="$(find src/Cotton.Mobile/bin/Release/net10.0-android -name '*-Signed.apk' -print -quit)"
          if [ -z "$apk_path" ]; then
            echo "Signed APK was not found." >&2
            exit 1
          fi
          cp "$apk_path" "$release_dir/CottonCloud-Android.apk"

          aab_path="$(find src/Cotton.Mobile/bin/Release/net10.0-android -name '*-Signed.aab' -print -quit)"
          if [ -n "$aab_path" ]; then
            cp "$aab_path" "$release_dir/CottonCloud-Android.aab"
          fi

          {
            echo "# Cotton Cloud Android"
            echo
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo "- App version: $APPLICATION_DISPLAY_VERSION"
            echo "- Android versionCode: $ANDROID_VERSION_CODE"
            echo
            echo "Install the APK asset directly on Android devices, or use the Google Play testing link when the tester is opted in."
          } > "$release_dir/release-notes.md"

          echo "COTTON_GITHUB_RELEASE_DIR=$release_dir" >> "$GITHUB_ENV"

      - name: Publish latest GitHub Release
        if: inputs.publish_github_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ inputs.github_release_tag }}"
          release_dir="$COTTON_GITHUB_RELEASE_DIR"

          git tag -f "$tag" "$GITHUB_SHA"
          git push --force origin "refs/tags/$tag"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "Cotton Cloud Android" \
              --notes-file "$release_dir/release-notes.md" \
              --latest
          else
            gh release create "$tag" \
              --title "Cotton Cloud Android" \
              --notes-file "$release_dir/release-notes.md" \
              --latest \
              --verify-tag
          fi

          release_assets=("$release_dir/CottonCloud-Android.apk")
          if [ -f "$release_dir/CottonCloud-Android.aab" ]; then
            release_assets+=("$release_dir/CottonCloud-Android.aab")
          fi
          gh release upload "$tag" "${release_assets[@]}" --clobber

      - name: Setup Python
        if: inputs.upload_to_google_play
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Google Play upload dependencies
        if: inputs.upload_to_google_play
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install google-auth requests

      - name: Upload signed AAB to Google Play
        if: inputs.upload_to_google_play
        run: |
          if [ -z "${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret is required for Google Play upload." >&2
            exit 1
          fi

          aab_path="$(find src/Cotton.Mobile/bin/Release/net10.0-android -name '*-Signed.aab' -print -quit)"
          if [ -z "$aab_path" ]; then
            echo "Signed AAB was not found." >&2
            exit 1
          fi

          release_name="Cotton Mobile ${GITHUB_RUN_NUMBER}"
          changes_not_sent_flag=()
          if [ "${{ inputs.google_play_changes_not_sent_for_review }}" = "true" ]; then
            changes_not_sent_flag+=(--changes-not-sent-for-review)
          fi

          python3 scripts/mobile/upload-google-play.py \
            --package-name "$GOOGLE_PLAY_PACKAGE_NAME" \
            --bundle "$aab_path" \
            --track "${{ inputs.google_play_track }}" \
            --release-status "${{ inputs.google_play_release_status }}" \
            --release-name "$release_name" \
            --release-notes-file store/google-play/default-listing/release-notes.txt \
            "${changes_not_sent_flag[@]}"

  google-play-store-listing:
    name: Upload Google Play Store Listing
    runs-on: ubuntu-latest
    needs:
      - workflow-dispatch-guards
    if: github.event_name == 'workflow_dispatch' && inputs.upload_store_listing
    permissions:
      contents: read
    env:
      GOOGLE_PLAY_PACKAGE_NAME: dev.cottoncloud.app
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Check repository
        uses: actions/checkout@v5

      - name: Confirm listing review submission
        run: |
          if [ "${{ inputs.confirm_store_listing_review_submission }}" != "true" ] \
            && [ "${{ inputs.google_play_changes_not_sent_for_review }}" != "true" ]; then
            echo "Google Play sends store listing changes for review automatically." >&2
            echo "Set confirm_store_listing_review_submission=true to continue." >&2
            echo "Alternatively, set google_play_changes_not_sent_for_review=true to save changes without review submission." >&2
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Google Play upload dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install google-auth requests

      - name: Upload default store listing
        run: |
          if [ -z "${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret is required for Google Play listing upload." >&2
            exit 1
          fi

          changes_not_sent_flag=()
          if [ "${{ inputs.google_play_changes_not_sent_for_review }}" = "true" ]; then
            changes_not_sent_flag+=(--changes-not-sent-for-review)
          fi

          scripts/mobile/upload-google-play-listing.py \
            --package-name "$GOOGLE_PLAY_PACKAGE_NAME" \
            "${changes_not_sent_flag[@]}"
